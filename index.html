<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Solar System - Mobile Responsive Planetary System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Arial', sans-serif;
            touch-action: none; /* Improves touch performance for canvas */
        }
        
        /* UI Overlay - Enhanced mobile responsiveness */
        .info-panel {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            color: white;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
            border-left: 4px solid #ffaa44;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        
        .info-panel h1 {
            margin: 0 0 4px 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        
        .info-panel p {
            margin: 0;
            font-size: 0.7rem;
            opacity: 0.85;
            white-space: nowrap;
        }
        
        .controls-panel {
            position: absolute;
            bottom: max(12px, env(safe-area-inset-bottom));
            left: max(12px, env(safe-area-inset-left));
            right: max(12px, env(safe-area-inset-right));
            color: white;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        /* Touch hint for mobile */
        .controls-panel span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .controls-panel .mobile-hint {
            display: inline-block;
        }
        
        .planet-label {
            position: absolute;
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 200;
            font-weight: 500;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.25);
            transition: opacity 0.1s;
            font-family: system-ui;
        }
        
        /* Responsive styles for smaller devices */
        @media (max-width: 768px) {
            .info-panel {
                padding: 8px 14px;
                border-radius: 16px;
                top: 8px;
                left: 8px;
            }
            .info-panel h1 { 
                font-size: 0.9rem; 
                letter-spacing: 0.5px;
            }
            .info-panel p { 
                font-size: 0.55rem; 
                white-space: normal;
                max-width: 180px;
                line-height: 1.2;
            }
            .controls-panel {
                font-size: 9px;
                padding: 6px 12px;
                bottom: 10px;
                left: 10px;
                right: 10px;
                gap: 12px;
                border-radius: 30px;
            }
            .controls-panel span {
                font-size: 8px;
            }
            .planet-label {
                font-size: 9px;
                padding: 1px 6px;
                white-space: nowrap;
            }
        }
        
        /* For extra small phones (max-width: 480px) */
        @media (max-width: 480px) {
            .info-panel {
                max-width: 65%;
            }
            .info-panel h1 {
                font-size: 0.8rem;
            }
            .info-panel p {
                font-size: 0.5rem;
                white-space: normal;
            }
            .controls-panel {
                font-size: 8px;
                padding: 5px 10px;
                gap: 8px;
            }
            .controls-panel span {
                font-size: 7px;
            }
        }
        
        /* Landscape orientation adjustment */
        @media (orientation: landscape) and (max-height: 500px) {
            .info-panel {
                top: 5px;
                left: 5px;
                padding: 6px 12px;
            }
            .info-panel h1 { font-size: 0.75rem; }
            .controls-panel {
                bottom: 5px;
                padding: 4px 10px;
                font-size: 7px;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .info-panel, .controls-panel {
            animation: fadeIn 0.6s ease-out;
        }
        
        /* Improve tap targets and general readability on mobile */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: pinch-zoom; /* Allow pinch zoom but OrbitControls handles it */
        }
        
        /* Hide scrollbar for better UI */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌌 3D SOLAR SYSTEM</h1>
        <p>Realistic orbits | Touch & drag to explore | Pinch to zoom</p>
    </div>
    <div class="controls-panel">
        <span>🖱️ 🖐️ Drag to rotate</span>
        <span>🔍 Pinch / Scroll to zoom</span>
        <span>✋ Two-finger pan</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup Scene with optimized fog for performance ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0004); // Lighter fog for performance
        
        // --- Camera: Adjusted for better mobile viewing (slightly wider FOV) ---
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 28);
        camera.lookAt(0, 0, 0);
        
        // --- Renderer with optimized settings for mobile ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- Post Processing: Bloom with mobile-friendly settings ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.3, 0.5);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.7; // Reduced slightly for better mobile performance
        bloomPass.radius = 0.6;
        
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- OrbitControls: Enhanced for touch & mobile gestures ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // Smooth inertia
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 0.8;               // Responsive on touch
        controls.rotateSpeed = 0.8;
        controls.panSpeed = 0.7;
        controls.touchRotate = true;
        controls.touchZoom = true;
        controls.target.set(0, 0, 0);
        
        // --- Lighting: Balanced for mobile GPU ---
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        // Sun light (main light source)
        const sunLight = new THREE.PointLight(0xffaa66, 2.2, 45);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 512;    // Reduce shadow map size for mobile perf
        sunLight.shadow.mapSize.height = 512;
        scene.add(sunLight);
        
        // Fill light from above
        const fillLight = new THREE.DirectionalLight(0x6688bb, 0.3);
        fillLight.position.set(1, 2, 1);
        scene.add(fillLight);
        
        // Optional back rim light
        const rimLight = new THREE.PointLight(0x4466aa, 0.25);
        rimLight.position.set(-2, 1, -3);
        scene.add(rimLight);
        
        // --- Create the Sun (with realistic glow, optimized geometry) ---
        const sunGeometry = new THREE.SphereGeometry(2.2, 96, 96); // Slightly lower poly for perf
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa55,
            emissive: 0xff4411,
            emissiveIntensity: 1.1,
            metalness: 0.1,
            roughness: 0.3
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.castShadow = false;
        scene.add(sun);
        
        // Glow halo
        const sunGlowGeometry = new THREE.SphereGeometry(2.5, 32, 32);
        const sunGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xff8844,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
        scene.add(sunGlow);
        
        // --- Starfield: Efficient particle system ---
        const starCount = 3000; // Reduced for better mobile performance
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 700;
            starPositions[i*3+1] = (Math.random() - 0.5) * 380;
            starPositions[i*3+2] = (Math.random() - 0.5) * 180 - 70;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- Helper: Orbit creation with subtle colors ---
        function createOrbit(radius, color = 0x6699cc) {
            const points = [];
            const segments = 100;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                points.push(new THREE.Vector3(x, 0, z));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.35 });
            const orbit = new THREE.LineLoop(geometry, material);
            scene.add(orbit);
            return orbit;
        }
        
        // --- Planet Data (artistically scaled for visual appeal & mobile performance)---
        const planetsData = [
            { name: "Mercury", radius: 0.25, distance: 3.5, color: 0xbc9a6c, speed: 0.025, emissive: 0x332200 },
            { name: "Venus",   radius: 0.32, distance: 4.8, color: 0xe6b856, speed: 0.018, emissive: 0x442200 },
            { name: "Earth",   radius: 0.38, distance: 6.2, color: 0x4a8fe7, speed: 0.015, emissive: 0x002244 },
            { name: "Mars",    radius: 0.35, distance: 7.8, color: 0xcc6644, speed: 0.012, emissive: 0x331100 },
            { name: "Jupiter", radius: 0.65, distance: 10.5, color: 0xd8a27a, speed: 0.008, emissive: 0x442200 },
            { name: "Saturn",  radius: 0.58, distance: 13.0, color: 0xecd5a3, speed: 0.006, emissive: 0x332200, hasRing: true },
            { name: "Uranus",  radius: 0.48, distance: 15.5, color: 0xb0e0e6, speed: 0.005, emissive: 0x114455 },
            { name: "Neptune", radius: 0.47, distance: 18.2, color: 0x4a6ef5, speed: 0.004, emissive: 0x001133 }
        ];
        
        // Create orbit rings
        planetsData.forEach(planet => {
            createOrbit(planet.distance, 0x77aaff);
        });
        
        // Store planet meshes
        const planets = [];
        
        // Create planets with optimized materials
        planetsData.forEach((data) => {
            const geometry = new THREE.SphereGeometry(data.radius, 56, 56); // Balanced detail
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.emissive,
                emissiveIntensity: 0.08,
                metalness: 0.2,
                roughness: 0.6
            });
            const planet = new THREE.Mesh(geometry, material);
            planet.castShadow = true;
            planet.receiveShadow = false;
            planet.userData = {
                distance: data.distance,
                speed: data.speed,
                angle: Math.random() * Math.PI * 2,
                name: data.name,
                hasRing: data.hasRing || false
            };
            scene.add(planet);
            
            // Saturn's ring
            if (data.hasRing) {
                const ringGeo = new THREE.TorusGeometry(data.radius * 1.28, 0.12, 28, 90);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xcbb88e, metalness: 0.4, roughness: 0.5 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.2;
                ring.rotation.z = 0.3;
                planet.add(ring);
                planet.userData.ring = ring;
            }
            
            // Earth's subtle atmosphere
            if (data.name === "Earth") {
                const atmosGeo = new THREE.SphereGeometry(data.radius * 1.07, 40, 40);
                const atmosMat = new THREE.MeshPhongMaterial({
                    color: 0x88aaff,
                    transparent: true,
                    opacity: 0.12,
                    side: THREE.BackSide
                });
                const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
                planet.add(atmosphere);
            }
            
            planets.push(planet);
        });
        
        // --- Asteroid Belt: Optimized particle count for mobile ---
        const asteroidCount = 2000;
        const asteroidGeometry = new THREE.BufferGeometry();
        const asteroidPositions = new Float32Array(asteroidCount * 3);
        for (let i = 0; i < asteroidCount; i++) {
            const radius = 8.5 + Math.random() * 1.8;
            const angle = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 1.0;
            asteroidPositions[i*3] = Math.cos(angle) * radius;
            asteroidPositions[i*3+1] = yOffset;
            asteroidPositions[i*3+2] = Math.sin(angle) * radius;
        }
        asteroidGeometry.setAttribute('position', new THREE.BufferAttribute(asteroidPositions, 3));
        const asteroidMaterial = new THREE.PointsMaterial({ color: 0xaa8866, size: 0.045 });
        const asteroidField = new THREE.Points(asteroidGeometry, asteroidMaterial);
        scene.add(asteroidField);
        
        // --- Earth's Moon with improved orbit ---
        const moonGeometry = new THREE.SphereGeometry(0.1, 32, 32);
        const moonMaterial = new THREE.MeshStandardMaterial({ color: 0xccccaa, roughness: 0.7 });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        scene.add(moon);
        let moonAngle = 0;
        
        // --- Nebula effect: subtle floating particles (performance friendly)---
        const nebulaCount = 600;
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPos = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            nebulaPos[i*3] = (Math.random() - 0.5) * 55;
            nebulaPos[i*3+1] = (Math.random() - 0.5) * 28;
            nebulaPos[i*3+2] = (Math.random() - 0.5) * 48 - 25;
        }
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        const nebulaMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeo, nebulaMat);
        scene.add(nebulaCloud);
        
        // --- Create Canvas-based Text Labels (mobile optimized readability)---
        function createLabel(name, color) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            context.fillStyle = 'rgba(0,0,0,0)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            // Responsive font based on name length
            let fontSize = 26;
            if (name.length > 7) fontSize = 22;
            context.font = `Bold ${fontSize}px "Segoe UI", system-ui, -apple-system`;
            context.fillStyle = color;
            context.textAlign = 'center';
            context.fillText(name, canvas.width/2, canvas.height/2);
            context.font = `14px monospace`;
            context.fillStyle = '#ffdd99';
            context.fillText('✦', canvas.width/2, canvas.height/2 + 35);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(1.1, 0.55, 1);
            return sprite;
        }
        
        // Attach labels
        const labels = [];
        planets.forEach(planet => {
            const label = createLabel(planet.userData.name, '#ffffff');
            scene.add(label);
            labels.push({ label, planet });
        });
        
        // Sun label glowing
        const sunLabel = createLabel('☀️ SUN', '#ffaa77');
        sunLabel.scale.set(1.4, 0.7, 1);
        scene.add(sunLabel);
        
        // --- Responsive window resize handler with device pixel ratio adjustment---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            // Adjust pixel ratio dynamically for perf on mobile
            const pixelRatio = Math.min(window.devicePixelRatio, 2);
            renderer.setPixelRatio(pixelRatio);
        }
        window.addEventListener('resize', onWindowResize);
        
        // --- Animation Loop with smooth mobile performance ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Gentle rotation for starfield and nebula
            stars.rotation.y += 0.0004;
            stars.rotation.x += 0.0002;
            asteroidField.rotation.y += 0.0015;
            nebulaCloud.rotation.y += 0.0002;
            
            // Sun pulsation effect
            const intensity = 1.0 + Math.sin(time * 2.2) * 0.18;
            sunMaterial.emissiveIntensity = intensity;
            sunLight.intensity = 2.1 + Math.sin(time * 1.9) * 0.35;
            sunGlow.scale.setScalar(1 + Math.sin(time * 2.8) * 0.025);
            
            // Update planet positions (orbital motion)
            planets.forEach(planet => {
                const data = planet.userData;
                data.angle += data.speed * 0.55; // Smooth orbital speed
                if (data.angle > Math.PI * 2) data.angle -= Math.PI * 2;
                
                const x = Math.cos(data.angle) * data.distance;
                const z = Math.sin(data.angle) * data.distance;
                planet.position.set(x, 0, z);
                
                // Rotation on axis
                planet.rotation.y += 0.018;
                
                // Ring rotation for Saturn
                if (data.ring) {
                    data.ring.rotation.z += 0.008;
                    data.ring.rotation.x = Math.PI / 2.2 + Math.sin(time * 0.7) * 0.08;
                }
            });
            
            // Moon orbiting Earth
            const earthPlanet = planets.find(p => p.userData.name === "Earth");
            if (earthPlanet) {
                moonAngle += 0.048;
                const moonDist = 0.85;
                const moonX = earthPlanet.position.x + Math.cos(moonAngle) * moonDist;
                const moonZ = earthPlanet.position.z + Math.sin(moonAngle) * moonDist;
                moon.position.set(moonX, 0.12, moonZ);
                moon.rotation.y += 0.025;
            }
            
            // Update label positions (sprites follow planets)
            labels.forEach(({ label, planet }) => {
                label.position.copy(planet.position);
                const radius = planet.geometry.parameters.radius;
                label.position.y += radius + 0.45;
                // Slight scaling for mobile readability
                const distToCam = camera.position.distanceTo(planet.position);
                const scaleFactor = Math.min(1.1, 1.2 / (distToCam * 0.08));
                label.scale.set(1.0 * scaleFactor, 0.55 * scaleFactor, 1);
            });
            sunLabel.position.set(0, 2.6, 0);
            const sunDistToCam = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            const sunScale = Math.min(1.5, 1.6 / (sunDistToCam * 0.06));
            sunLabel.scale.set(1.3 * sunScale, 0.7 * sunScale, 1);
            
            // Small asteroid field rotation
            asteroidField.rotation.y += 0.0008;
            
            // Update controls for inertia
            controls.update();
            
            // Final render with effect composer
            effectComposer.render();
        }
        
        animate();
        
        // Small console log for success message
        console.log('🚀 3D Solar System Loaded — Fully mobile responsive with touch controls!');
    </script>
</body>
</html>
